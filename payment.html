<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment • IronCore Fitness</title>
  <style>
    :root{
      --bg:#0b0f14;--card:#121823;--muted:#9fb0c0;--text:#eaf1f7;--brand:#6ae3ff;--brand2:#7cffb2;--acc:#ffce6a;
      --rad:18px;--pad:1.25rem;--shadow:0 10px 30px rgba(0,0,0,.35)
    }
    *{box-sizing:border-box}
    body{
      margin:0;font:16px/1.6 system-ui;-webkit-font-smoothing:antialiased;
      color:var(--text); background:var(--bg)
    }
    a{color:inherit;text-decoration:none}
    .container{max-width:900px;margin:0 auto;padding:0 1rem}
    header{
      position:sticky;top:0;z-index:50;backdrop-filter:saturate(1.2) blur(8px);
      background:rgba(11,15,20,.9); border-bottom:1px solid rgba(255,255,255,.06)
    }
    .nav{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0}
    .brand{display:flex;gap:.6rem;align-items:center;font-weight:800;letter-spacing:.5px}
    .logo{width:36px;height:36px;border-radius:10px;background:
      conic-gradient(from 200deg,var(--brand),var(--brand2),var(--acc),var(--brand))}
    .btn{display:inline-block;border:1px solid rgba(255,255,255,.14);
      padding:.6rem 1rem;border-radius:999px}
    .btn.primary{border:none;background:linear-gradient(90deg,var(--brand),var(--brand2));
      color:#062026;font-weight:700}
    main{padding:4rem 0}
    h1{margin:0 0 1rem;font-size:2rem}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--rad);
      padding:var(--pad);
      box-shadow:var(--shadow)
    }
    form{display:grid;gap:1rem;margin-top:1.5rem}
    label{display:flex;flex-direction:column;gap:.3rem}
    input,select{
      padding:.8rem 1rem;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:#0e141c;
      color:var(--text)
    }
    footer{padding:2rem 0;color:var(--muted);text-align:center;
      border-top:1px solid rgba(255,255,255,.06)}
  </style>
</head>
<body>
<header>
  <div class="container nav">
    <a class="brand" href="index.html"><div class="logo"></div>IronCore Fitness</a>
    <a class="btn" href="index.html">Back</a>
  </div>
</header>

<main>
  <div class="container">
    <h1>Complete Your Payment</h1>
    <p class="sub">Select your plan and enter your card details below.</p>

    <div class="card">
      <h2 style="margin:0 0 1rem">Membership Summary</h2>
      <label>
        <span>Plan</span>
        <select id="plan">
          <option value="Starter">$19/week – Starter</option>
          <option value="Unlimited">$29/week – Unlimited</option>
          <option value="Personal">$59/week – Personal Training</option>
        </select>
      </label>
      <form onsubmit="event.preventDefault(); alert('Payment successful!');">
        <label>
          <span>Full Name</span>
          <input required placeholder="John Doe" />
        </label>
        <label>
          <span>Email</span>
          <input type="email" required placeholder="you@example.com" />
        </label>
        <label>
          <span>Card Number</span>
          <input required maxlength="16" placeholder="1234 5678 9012 3456" />
        </label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <label>
            <span>Expiry (MM/YY)</span>
            <input required placeholder="08/27" />
          </label>
          <label>
            <span>CVC</span>
            <input required maxlength="4" placeholder="123" />
          </label>
        </div>
        <button class="btn primary" type="submit">Pay Now</button>
      </form>
    </div>
  </div>
</main>

<footer>
  © <span id="year"></span> IronCore Fitness — All rights reserved.
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
